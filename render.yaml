services:
  - type: web
    name: render-openclaw
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8080"
      - key: INTERNAL_GATEWAY_PORT
        value: "18789"
      - key: OPENCLAW_STATE_DIR
        value: /app/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /app/workspace
      - key: RENDER_SETUP_PASSWORD
        sync: false
      - key: RENDER_GATEWAY_TOKEN
        generateValue: true
